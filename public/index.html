<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPC/Harness System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 20px; }
        textarea { width: 100%; min-height: 100px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; resize: vertical; font-family: inherit; }
        textarea:focus { outline: none; border-color: #667eea; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 30px; font-size: 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 15px; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .tasks-list { max-height: 500px; overflow-y: auto; }
        .task-item { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .task-status { padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .status-completed { background: #e8f5e9; color: #388e3c; }
        .status-running { background: #fff3e0; color: #f57c00; }
        .status-created { background: #e3f2fd; color: #1976d2; }
        .status-failed { background: #ffebee; color: #d32f2f; }
        .task-steps { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e0e0e0; font-size: 0.9rem; }
        .step { padding: 4px 0; }
        .step-completed { color: #388e3c; }
        .step-in_progress { color: #f57c00; }
        .step-failed { color: #d32f2f; }
        .loading { text-align: center; color: #666; padding: 20px; }
        .artifact-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .artifact-btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; }
        .btn-prd { background: #4CAF50; color: white; }
        .btn-architecture { background: #9C27B0; color: white; }
        .btn-implementation { background: #2196F3; color: white; }
        .btn-backend { background: #FF9800; color: white; }
        .btn-testing { background: #E91E63; color: white; }
        .btn-marketing { background: #00BCD4; color: white; }
        .btn-evaluation { background: #607D8B; color: white; }
        .agents-used { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e0e0e0; }
        .agents-used strong { display: block; margin-bottom: 8px; }
        .agent-tag { display: inline-block; padding: 4px 10px; background: #e3f2fd; border-radius: 20px; font-size: 0.8rem; margin-right: 8px; margin-bottom: 5px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 12px; padding: 20px; max-width: 90%; max-height: 80%; overflow: auto; position: relative; min-width: 600px; }
        .modal-close { position: absolute; top: 10px; right: 10px; background: #f44336; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; }
        .modal-title { margin-bottom: 15px; }
        .modal-pre { background: #f5f5f5; padding: 15px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; font-family: monospace; font-size: 14px; max-height: 60vh; overflow-y: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #f5f5f5; }
        .tab.active { background: #667eea; color: white; border-color: #667eea; }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; }
        .agent-card { background: #f8f9fa; border-radius: 8px; padding: 15px; border: 1px solid #e0e0e0; }
        .agent-emoji { font-size: 1.5rem; margin-bottom: 8px; }
        .agent-name { font-weight: 600; margin-bottom: 5px; }
        .agent-description { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 OPC/Harness System</h1>
            <p>Multi-agent autonomous workflow orchestration</p>
        </header>

        <div class="card">
            <h2>Create New Task</h2>
            <textarea id="goal" placeholder="What do you want to build?&#10;&#10;Examples:&#10;- Create a simple todo list app&#10;- Build a personal portfolio website&#10;- Develop a weather dashboard"></textarea>
            <button class="btn" id="startBtn" onclick="startTask()">Start Task</button>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="showTab('tasks')">Tasks</div>
                <div class="tab" onclick="showTab('agents')">Available Agents</div>
            </div>
            
            <div id="tasksTab">
                <h2>Tasks</h2>
                <div id="tasksList" class="tasks-list">
                    <div class="loading">Loading tasks...</div>
                </div>
            </div>
            
            <div id="agentsTab" style="display: none;">
                <h2>Available Agents (<span id="agentCount">0</span>)</h2>
                <div id="agentsGrid" class="agents-grid">
                    <div class="loading">Loading agents...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab:nth-child(${tabName === 'tasks' ? 1 : 2})`).classList.add('active');
            document.getElementById('tasksTab').style.display = tabName === 'tasks' ? 'block' : 'none';
            document.getElementById('agentsTab').style.display = tabName === 'agents' ? 'block' : 'none';
            if (tabName === 'agents') loadAgents();
        }

        async function startTask() {
            const goal = document.getElementById('goal').value.trim();
            if (!goal) { alert('Please enter a goal!'); return; }
            
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ goal })
                });
                const task = await response.json();
                document.getElementById('goal').value = '';
                await loadTasks();
            } catch (error) {
                alert('Error creating task: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Start Task';
            }
        }

        async function loadTasks() {
            const list = document.getElementById('tasksList');
            try {
                const response = await fetch('/api/tasks');
                const tasks = await response.json();
                
                if (tasks.length === 0) {
                    list.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">No tasks yet. Create one above!</p>';
                    return;
                }
                
                list.innerHTML = tasks.reverse().map(task => `
                    <div class="task-item">
                        <div class="task-header">
                            <div style="flex: 1;">
                                <strong>${task.goal.substring(0, 100)}${task.goal.length > 100 ? '...' : ''}</strong>
                            </div>
                            <span class="task-status status-${task.status}">${task.status}</span>
                        </div>
                        <div style="font-size: 0.85rem; color: #666; margin-bottom: 10px;">
                            Created: ${new Date(task.createdAt).toLocaleString()}
                        </div>
                        <div class="task-steps">
                            <strong>Steps:</strong>
                            ${task.steps.map(step => `<div class="step step-${step.status}">• ${step.name}: ${step.status.replace('_', ' ')}</div>`).join('')}
                        </div>
                        ${task.selectedAgents?.length > 0 ? `
                            <div class="agents-used">
                                <strong>Agents Used:</strong>
                                ${task.selectedAgents.map(agentId => `<span class="agent-tag">${agentId.replace('engineering-', '').replace('design-', '').replace('marketing-', '').replace('testing-', '').replace('product-', '').replace('-', ' ')}</span>`).join('')}
                            </div>
                        ` : ''}
                        ${task.status === 'completed' ? `
                            <div class="artifact-buttons">
                                <button class="artifact-btn btn-prd" onclick="viewArtifact('${task.id}', 'prds', 'prd.md')">📋 PRD</button>
                                <button class="artifact-btn btn-architecture" onclick="viewArtifact('${task.id}', 'architectures', 'architecture.md')">🏛️ Architecture</button>
                                <button class="artifact-btn btn-implementation" onclick="viewArtifact('${task.id}', 'implementations', 'index.html')">💻 Implementation</button>
                                <button class="artifact-btn btn-backend" onclick="viewArtifact('${task.id}', 'backends', 'api-spec.md')">⚙️ Backend API</button>
                                <button class="artifact-btn btn-testing" onclick="viewArtifact('${task.id}', 'tests', 'test-report.md')">🧪 Test Report</button>
                                <button class="artifact-btn btn-marketing" onclick="viewArtifact('${task.id}', 'marketing', 'marketing-plan.md')">� Marketing</button>
                                <button class="artifact-btn btn-evaluation" onclick="viewArtifact('${task.id}', 'evaluations', 'evaluation.md')">📊 Evaluation</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = '<p style="color: #d32f2f; text-align: center;">Error loading tasks</p>';
            }
        }

        async function loadAgents() {
            const grid = document.getElementById('agentsGrid');
            try {
                const response = await fetch('/api/agents');
                const agents = await response.json();
                document.getElementById('agentCount').textContent = agents.length;
                
                grid.innerHTML = agents.map(agent => `
                    <div class="agent-card">
                        <div class="agent-emoji">${agent.emoji}</div>
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-description">${agent.description.substring(0, 80)}${agent.description.length > 80 ? '...' : ''}</div>
                    </div>
                `).join('');
            } catch (error) {
                grid.innerHTML = '<p style="color: #d32f2f; text-align: center;">Error loading agents</p>';
            }
        }

        async function viewArtifact(taskId, type, filename) {
            try {
                const response = await fetch(`/api/artifacts/${taskId}/${type}/${filename}`);
                if (!response.ok) throw new Error('File not found');
                
                const content = await response.text();
                const modal = document.createElement('div');
                modal.className = 'modal';
                
                const modalContent = document.createElement('div');
                modalContent.className = 'modal-content';
                
                const closeBtn = document.createElement('button');
                closeBtn.className = 'modal-close';
                closeBtn.textContent = '✕';
                closeBtn.onclick = () => document.body.removeChild(modal);
                
                const title = document.createElement('h3');
                title.className = 'modal-title';
                title.textContent = `${filename} (${type})`;
                
                const pre = document.createElement('pre');
                pre.className = 'modal-pre';
                pre.textContent = content;
                
                modalContent.appendChild(closeBtn);
                modalContent.appendChild(title);
                modalContent.appendChild(pre);
                modal.appendChild(modalContent);
                
                document.body.appendChild(modal);
                modal.onclick = (e) => { if (e.target === modal) document.body.removeChild(modal); };
            } catch (error) {
                alert('Error loading artifact: ' + error.message);
            }
        }

        loadTasks();
        setInterval(loadTasks, 3000);
    </script>
</body>
</html>
